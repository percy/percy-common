inherit_from: .rubocop_todo.yml

inherit_gem:
  percy-style:
    - default.yml

inherit_mode:
  merge:
    - Include

RSpec/DescribeClass:
  Exclude:
    - spec/percy/logger_spec.rb

# TODO: disable new cops
AllCops:
  # NOTE: pinned to 3.0 because the bundled rubocop (0.93.1 via percy-style)
  # does not understand newer values. The gemspec still requires Ruby >= 3.1
  # at runtime; bump this once percy-style/rubocop are upgraded.
  TargetRubyVersion: 3.0
  Exclude:
    - spec/support/redis_mock.rb
